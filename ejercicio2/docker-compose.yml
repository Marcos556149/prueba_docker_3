version: '3.8'

services:

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: spring_boot_jpa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 43642127
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ejercicio2:
    build:
      context: ./ejercicio2
    container_name: ejercicio2_app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/spring_boot_jpa
      DB_USER: postgres
      DB_PASSWORD: 43642127
    depends_on:
      db:
        condition: service_healthy